name: build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to attach binaries to a Release on tag push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: "**/go.mod"

      # The project may live at the repo root or inside a subfolder.
      # Find the directory that holds `module relay` and use it everywhere.
      - name: Locate Go module
        id: mod
        run: |
          d=$(dirname "$(grep -rl '^module relay$' --include=go.mod . | head -1)")
          if [ -z "$d" ] || { [ "$d" = "." ] && [ ! -f go.mod ]; }; then
            echo "could not find go.mod declaring 'module relay'" >&2
            exit 1
          fi
          echo "dir=$d" >> "$GITHUB_OUTPUT"
          echo "module directory: $d"

      # Resolves github.com/imgk/divert-go (WinDivert 2.x) + golang.org/x/sys
      # and writes a fresh go.sum.
      - name: Resolve dependencies
        working-directory: ${{ steps.mod.outputs.dir }}
        run: go mod tidy

      - name: Vet & test
        working-directory: ${{ steps.mod.outputs.dir }}
        run: |
          go vet ./proto/... ./server/...
          GOOS=windows GOARCH=amd64 go vet ./client/...
          go test ./proto/...

      - name: Build server (linux/amd64)
        working-directory: ${{ steps.mod.outputs.dir }}
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w" -o dist/relay-server ./server

      - name: Build client (windows/amd64)
        working-directory: ${{ steps.mod.outputs.dir }}
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags "-s -w" -o dist/relay-client.exe ./client

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-server-linux-amd64
          path: ${{ steps.mod.outputs.dir }}/dist/relay-server

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-client-windows-amd64
          path: ${{ steps.mod.outputs.dir }}/dist/relay-client.exe

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.mod.outputs.dir }}/dist/relay-server
            ${{ steps.mod.outputs.dir }}/dist/relay-client.exe
